<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - ActionFlow</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/auth/forgot_password.css') }}">
</head>
<body>
<div class="container">
    <div class="form-container">
        <div class="form-header">
            <h2><i class="fas fa-key"></i> Forgot Password</h2>
        </div>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="server-messages {{ category }}">
                        <p>{{ message }}</p>
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('auth.forgot_password') }}">
            <div class="form-content">
                <p style="text-align: center; color: #555; margin-bottom: 25px;">Enter your email address and we will send you instructions to reset your password.</p>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <div class="input-container">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="email" name="email" placeholder="Enter your registered email" required>
                    </div>
                </div>

                <button type="submit" class="submit-button">Send Reset Link</button>

                <div class="back-link">
                    <a href="{{ url_for('auth.login') }}"><i class="fas fa-arrow-left"></i> Back to Login</a>
                </div>
            </div>
        </form>
    </div>
</div>
</body>
</html>
